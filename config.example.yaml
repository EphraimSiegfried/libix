# Libix Configuration
# Copy this file to config.yaml and modify as needed

server:
  host: "0.0.0.0"
  port: 8080
  secret_key: "change-me-in-production"  # Used for JWT signing

database:
  path: "/var/lib/libix/libix.db"

library:
  path: "/media/audiobooks"

auth:
  # Initial admin user (created on first run if no users exist)
  initial_admin:
    username: "admin"
    password: "admin"  # Change this immediately after first login!
  jwt_expiry_hours: 24

prowlarr:
  url: "http://localhost:9696"
  api_key: "your-api-key"
  # Or use file-based secret (compatible with sops-nix, agenix):
  # api_key_file: "/run/secrets/prowlarr-api-key"

  # Search settings
  categories: [3030]  # 3030 = Audiobooks
  limit: 100

transmission:
  url: "http://localhost:9091/transmission/rpc"
  username: "admin"
  password: "password"
  # Or use file-based secret:
  # password_file: "/run/secrets/transmission-password"

  # Download settings
  download_dir: "/downloads/audiobooks"
